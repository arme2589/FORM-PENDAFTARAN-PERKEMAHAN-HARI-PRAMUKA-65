<!doctype html>
<html lang="id">
  <head>
    <script>
      (function() {
        try {
          var desc = Object.getOwnPropertyDescriptor(window, 'fetch') || Object.getOwnPropertyDescriptor(Window.prototype, 'fetch');
          if (!desc || desc.writable || desc.configurable) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to patch window.fetch writability:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pendaftaran Perkemahan Hari Pramuka Ke-65 - Kwarran Bulukumpa</title>
  </head>
  <body class="bg-gray-50 text-gray-800 antialiased selection:bg-sky-500 selection:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
